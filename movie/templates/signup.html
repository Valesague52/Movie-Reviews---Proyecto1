{% extends 'base.html' %}

            <div class="card">
                <div class="card-header bg-success text-white">
                    <h3 class="mb-0">✅ Suscripción Exitosa</h3>
                </div>
                <div class="card-body">
                    <p>Gracias por suscribirte con el correo:</p>
                    <div class="alert alert-info">
                        <strong>{{ email }}</strong>

                    <p>Recibirás nuestras novedades y promociones.</p>
                    <a href="{% url 'home' %}" class="btn btn-primary">← Volver al inicio</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
